name: 🏁 Deploy → AEP Production

on:
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'template_registry.json'

  workflow_dispatch:

jobs:
  validate:
    name: Validate SQL Templates
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate all SQL templates
        run: python scripts/validate_sql.py --all

  deploy-production:
    name: Push Templates to AEP Production
    runs-on: windows-latest
    needs: validate
    environment: aep-production

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

