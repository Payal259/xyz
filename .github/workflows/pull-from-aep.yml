name: Pull Templates from AEP Staging

on:
  workflow_dispatch:

jobs:
  pull-from-aep:
    name: Pull Templates from AEP into GitHub
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } elseif (Test-Path scripts/requirements.txt) {
            pip install -r scripts/requirements.txt
          } else {
            Write-Host "No requirements.txt found - skipping"
          }

      - name: Pull all templates from AEP
        shell: pwsh
        env:
          AEP_CLIENT_ID: ${{ secrets.AEP_CLIENT_ID }}
          AEP_CLIENT_SECRET: ${{ secrets.AEP_CLIENT_SECRET }}
          AEP_ORG_ID: ${{ secrets.AEP_ORG_ID }}
          AEP_SANDBOX_NAME: ${{ secrets.AEP_STAGING_SANDBOX }}
          AEP_API_BASE: https://platform.adobe.io
        run: python scripts/aep_sync.py pull

      - name: Commit pulled templates
        shell: pwsh
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add templates/
          git add template_registry.json
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: pull latest templates from AEP staging"
            git push origin HEAD
            Write-Host "Pulled templates committed and pushed."
          } else {
            Write-Host "No new templates to pull - everything already in sync."
          }
