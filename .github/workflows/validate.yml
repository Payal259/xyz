name: 🔍 Validate SQL Templates

on:
  pull_request:
    branches:
      - main
      - staging
    paths:
      - 'templates/**'
      - 'scripts/**'
      - 'template_registry.json'

  workflow_dispatch:

jobs:
  validate-sql:
    name: Validate SQL Templates
    runs-on: windows-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate all SQL templates
        id: validate
        shell: pwsh
        run: |
          python scripts/validate_sql.py --all 2>&1 | Tee-Object -Variable output
          $exitCode = $LASTEXITCODE
          $output | Out-File -FilePath validation_output.txt -Encoding UTF8
          exit $exitCode

      - name: Post validation result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('validation_output.txt', 'utf8');
            } catch (e) {
              output = 'Could not read validation output.';
            }
            const success = '${{ steps.validate.outcome }}' === 'success';
            const icon    = success ? '✅' : '❌';
            const title   = success
              ? '**SQL Validation Passed**'
              : '**SQL Validation Failed** — fix errors before merging.';
            const body = `## ${icon} AEP Query Template Validation\n\n${title}\n\n<details>\n<summary>Validation Output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('AEP Query Template Validation')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
